name: Apply final visual polish

on:
  push:
    branches: [fix-black-glass-polish]

permissions:
  contents: write

jobs:
  polish:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix-black-glass-polish
          persist-credentials: true
      - name: Patch HTML files
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          css = r'''<style id="final-polish-overrides">
          @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap');

          :root {
            --black: #000000;
            --graphite: rgba(10, 12, 14, .82);
            --graphite-soft: rgba(16, 18, 20, .86);
            --card: rgba(16, 18, 20, .72);
            --line: rgba(255,255,255,.11);
            --line-strong: rgba(255,255,255,.20);
          }

          html, body {
            background: #000 !important;
            background-image: none !important;
          }

          body {
            font-family: "Montserrat", Arial, sans-serif !important;
            font-kerning: normal;
            font-feature-settings: "kern" 1;
            text-rendering: optimizeLegibility;
          }

          .topbar {
            background: rgba(0, 0, 0, .42) !important;
            -webkit-backdrop-filter: blur(18px) saturate(120%);
            backdrop-filter: blur(18px) saturate(120%);
            border-bottom-color: rgba(255,255,255,.09) !important;
            box-shadow: 0 8px 28px rgba(0,0,0,.22);
          }

          .editorial-drawer {
            background: rgba(10, 12, 14, .76) !important;
            -webkit-backdrop-filter: blur(24px) saturate(112%);
            backdrop-filter: blur(24px) saturate(112%);
            border-left-color: rgba(255,255,255,.14) !important;
            box-shadow: -24px 0 80px rgba(0,0,0,.38), inset 1px 0 0 rgba(255,255,255,.035);
          }

          .drawer-overlay { background: rgba(0,0,0,.44) !important; }
          .drawer-title, .drawer-section h2, .section-kicker, .eyebrow, .contact-link small { letter-spacing: .12em !important; }
          .brand { letter-spacing: .10em !important; font-family: inherit !important; }
          .nav-links, .btn, .menu-toggle, .drawer-link, .drawer-item, p, .contact-link b { letter-spacing: 0 !important; }

          .hero-grid {
            grid-template-columns: minmax(0, 1fr) minmax(400px, .82fr) !important;
            gap: clamp(38px, 5vw, 76px) !important;
          }
          .hero-copy { min-width: 0; max-width: 100%; position: relative; z-index: 2; }
          .hero-visual { position: relative; z-index: 1; }
          h1 { max-width: 100% !important; white-space: normal !important; overflow-wrap: normal !important; word-break: normal !important; font-family: inherit !important; letter-spacing: -.04em !important; }
          h2 { font-family: inherit !important; letter-spacing: -.04em !important; }
          .hero-caption b, .caption b, .frame-index { font-family: inherit !important; }

          .panel,
          .concept-teaser,
          .author-card,
          .contact-card,
          .author-meta div,
          .contact-link,
          .drawer-close,
          .menu-toggle,
          .btn {
            background: rgba(12, 14, 16, .76) !important;
            border-color: rgba(255,255,255,.13) !important;
            -webkit-backdrop-filter: blur(18px) saturate(110%);
            backdrop-filter: blur(18px) saturate(110%);
          }

          .concept-teaser,
          .author-card,
          .contact-card {
            box-shadow: inset 0 1px 0 rgba(255,255,255,.045), 0 24px 76px rgba(0,0,0,.30) !important;
          }

          .render-card { background: #070809 !important; border-color: rgba(255,255,255,.14) !important; }
          .caption {
            display: block !important;
            width: 100% !important;
            padding: 18px 20px 20px !important;
            background: rgba(6,7,8,.97) !important;
            border-top-color: rgba(255,255,255,.12) !important;
            color: #f4f4f1 !important;
            text-align: left !important;
          }
          .caption b {
            display: block !important;
            color: #fff !important;
            font-size: 17px !important;
            line-height: 1.25 !important;
            letter-spacing: -.015em !important;
          }
          .caption span {
            display: block !important;
            margin-top: 6px !important;
            color: rgba(244,244,241,.72) !important;
            font-size: 13px !important;
            line-height: 1.55 !important;
            letter-spacing: 0 !important;
          }

          .contact-card {
            grid-template-columns: minmax(0,.58fr) minmax(400px,.76fr) minmax(220px,.40fr) !important;
            align-items: start !important;
            background: rgba(9,11,13,.82) !important;
          }
          .contact-links { align-content: start !important; }
          .contact-link {
            display: flex !important;
            flex-direction: column !important;
            justify-content: center !important;
            align-items: flex-start !important;
            min-height: 86px !important;
            padding: 16px !important;
            border-radius: 20px !important;
            width: 100% !important;
          }
          .contact-link b {
            font-size: 14px !important;
            line-height: 1.35 !important;
            word-break: normal !important;
            overflow-wrap: anywhere !important;
          }
          .drawer-contact-link span:last-child {
            max-width: 62%;
            text-align: right;
            overflow-wrap: anywhere;
            color: var(--ivory-muted);
          }

          @media (max-width: 1180px) and (min-width: 981px) {
            .hero-grid { grid-template-columns: minmax(0,1fr) minmax(350px,.75fr) !important; gap: 34px !important; }
            h1 { font-size: clamp(42px, 5vw, 62px) !important; }
            .contact-card { grid-template-columns: minmax(0,.7fr) minmax(390px,1fr) !important; }
            .contact-detail { grid-column: 1 / -1; max-height: 240px; }
          }

          @media (max-width: 980px) {
            .hero-grid, .contact-card { grid-template-columns: 1fr !important; }
            .hero-visual { order: -1; }
            .contact-detail { max-height: none; }
          }

          @media (max-width: 640px) {
            .topbar { background: rgba(0,0,0,.72) !important; -webkit-backdrop-filter: blur(13px) saturate(110%); backdrop-filter: blur(13px) saturate(110%); }
            .editorial-drawer { background: rgba(8,10,12,.90) !important; -webkit-backdrop-filter: blur(14px) saturate(108%); backdrop-filter: blur(14px) saturate(108%); }
            .caption { padding: 15px 16px 17px !important; }
            .caption b { font-size: 16px !important; }
            .caption span { font-size: 12px !important; }
            .contact-link { min-height: 78px !important; }
          }
          </style>'''

          def patch(path: Path):
              text = path.read_text(encoding='utf-8')
              text = re.sub(r'<style id="final-polish-overrides">.*?</style>\s*', '', text, flags=re.S)
              text = text.replace('</head>', css + '\n</head>', 1)
              text = text.replace('<meta name="theme-color" content="#111315">', '<meta name="theme-color" content="#000000">')

              text = re.sub(
                  r'<div class="drawer-item"><span>Telegram</span><span>[^<]*</span></div>',
                  '<a class="drawer-link drawer-contact-link" href="https://t.me/doomrushaz2000" target="_blank" rel="noopener noreferrer" aria-label="Открыть Telegram @doomrushaz2000"><span>Telegram</span><span>@doomrushaz2000</span></a>',
                  text
              )
              text = re.sub(
                  r'<div class="drawer-item"><span>Email</span><span>[^<]*</span></div>',
                  '<a class="drawer-link drawer-contact-link" href="mailto:yourtoxicpm@gmail.com" aria-label="Написать на yourtoxicpm@gmail.com"><span>Email</span><span>yourtoxicpm@gmail.com</span></a>',
                  text
              )

              text = re.sub(
                  r'<span class="contact-link" aria-label="Telegram[^\"]*">\s*<small>Telegram</small><b>[^<]*</b>\s*</span>',
                  '<a class="contact-link" href="https://t.me/doomrushaz2000" target="_blank" rel="noopener noreferrer" aria-label="Открыть Telegram @doomrushaz2000"><small>Telegram</small><b>@doomrushaz2000</b></a>',
                  text,
                  flags=re.S
              )
              text = re.sub(
                  r'<span class="contact-link" aria-label="Email[^\"]*">\s*<small>Email</small><b>[^<]*</b>\s*</span>',
                  '<a class="contact-link" href="mailto:yourtoxicpm@gmail.com" aria-label="Написать на yourtoxicpm@gmail.com"><small>Email</small><b>yourtoxicpm@gmail.com</b></a>',
                  text,
                  flags=re.S
              )

              text = re.sub(
                  r'(<div class="contact-intro">\s*<span class="section-kicker">Контакты</span>\s*<h2[^>]*>Контакты</h2>\s*)<p>.*?</p>',
                  r'\1<p>Связаться со мной можно напрямую через Telegram или Email. Ниже также доступны исходники и опубликованная версия проекта.</p>',
                  text,
                  flags=re.S
              )
              path.write_text(text, encoding='utf-8')

          for name in ('index.html', 'concept.html'):
              p = Path(name)
              if p.exists():
                  patch(p)

          workflow = Path('.github/workflows/apply-final-polish.yml')
          if workflow.exists():
              workflow.unlink()
          PY
      - name: Commit polished files
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi
          git commit -m "Polish glass UI, hero layout and contact section"
          git push origin HEAD:fix-black-glass-polish
